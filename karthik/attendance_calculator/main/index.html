<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Attendx</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a2328;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .desktop-container {
            position: relative;
            width: 100%;
            max-width: 1423px;
            height: 0;
            padding-bottom: 71.11%; /* Aspect ratio 1423:1012 */
            background: white;
            border-radius: 8px;
            box-shadow: -9px 4px 76px 0px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        
        .desktop-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Background video container with mask */
        .background-video-container {
            position: absolute;
            width: 79.2%;
            height: 161.26%;
            left: -14.13%;
            top: -2.37%;
            overflow: hidden;
            clip-path: polygon(2.2% 0%, 70% 8.4%, 59% 35.8%, 54.2% 40%, 65.2% 50.5%, 66.3% 60%, 55.3% 68.5%, 58% 86.8%, 66% 100%, 0% 100%, 0% 0%);
        }
        
        .background-video-container video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        /* Gradient overlay */
        .gradient-overlay {
            position: absolute;
            width: 100%;
            height: 70.65%;
            left: 0;
            top: 29.35%;
            background: linear-gradient(0.613859deg, rgba(0, 0, 0, 0.8) 3.5448%, rgba(217, 217, 217, 0) 91.537%);
            clip-path: polygon(2.2% 0%, 70% -20%, 59% 7%, 54.2% 12%, 65.2% 22%, 66.3% 32%, 55.3% 40%, 58% 58%, 66% 72%, 0% 72%, 0% 0%);
            pointer-events: none;
        }
        
        /* Logo text */
        .logo-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 42.79%;
            font-weight: 700;
            font-size: 5.06vw;
            line-height: 1;
            letter-spacing: -0.04em;
            color: white;
            text-align: center;
            z-index: 10;
            white-space: nowrap;
        }
        
        /* Welcome Back text */
        .welcome-text {
            position: absolute;
            left: 66.67%;
            top: 15.61%;
            font-weight: 700;
            font-size: 3.65vw;
            line-height: 1;
            letter-spacing: -0.06em;
            color: #1e1e1e;
        }
        
        /* Form container */
        .form-container {
            position: absolute;
            left: 66.67%;
            top: 29.64%;
            display: flex;
            flex-direction: column;
            gap: 1.48%;
            width: 23.9%;
        }
        
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.42%;
        }
        
        .form-label {
            font-weight: 500;
            font-size: 1.12vw;
            line-height: 1.2;
            color: #1e1e1e;
        }
        
        .form-input {
            width: 100%;
            padding: 1% 1.41%;
            border: 1px solid #5b5b5b;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.98vw;
            line-height: 1.2;
            color: #5b5b5b;
            background: transparent;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        
        .form-input::placeholder {
            color: #5b5b5b;
        }
        
        .password-field {
            display: flex;
            flex-direction: column;
            gap: 0.84%;
        }
        
        .password-input-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 1.41%;
            top: 50%;
            transform: translateY(-50%);
            width: 1.69vw;
            height: 1.69vw;
            cursor: pointer;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.42%;
        }
        
        .remember-me input[type="checkbox"] {
            width: 0.98vw;
            height: 0.98vw;
            border: 1px solid black;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .remember-me label,
        .forgot-password {
            font-weight: 500;
            font-size: 0.84vw;
            line-height: 1.2;
            color: black;
            cursor: pointer;
        }
        
        .forgot-password {
            text-decoration: none;
        }
        
        /* Sign in button */
        .signin-container {
            position: absolute;
            left: 66.67%;
            top: 55.04%;
            width: 23.9%;
        }
        
        .signin-btn {
            width: 100%;
            padding: 1% 1.41%;
            background: #1e1e1e;
            border: 1px solid rgba(91,91,91,0.5);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.98vw;
            line-height: 1.2;
            color: #fcfcfc;
            cursor: pointer;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }
        
        .signin-btn:hover {
            background: #2a2a2a;
        }
        
        /* Menu icon */
        .menu-icon {
            position: absolute;
            right: 3.24%;
            top: 2.77%;
            display: flex;
            flex-direction: column;
            gap: 0.3%;
            align-items: flex-end;
            width: 2.53%;
        }
        
        .menu-line {
            height: 0.4%;
            background: #1a1c1e;
            border-radius: 49px;
        }
        
        .menu-line:nth-child(1) { width: 100%; }
        .menu-line:nth-child(2) { width: 61.11%; }
        .menu-line:nth-child(3) { width: 113.89%; }
        
        /* Decorative circle (filled) */
        .circle-filled {
            position: absolute;
            left: 83.33%;
            top: 82.11%;
            width: 27.14%;
            height: 38.14%;
        }
        
        /* Circle outlines */
        .circle-outline {
            position: absolute;
            width: 27.63%;
            height: 38.83%;
        }
        
        .circle-outline-1 {
            left: 83.62%;
            top: 80.53%;
        }
        
        .circle-outline-2 {
            left: 83.62%;
            top: 79.05%;
        }
        
        .circle-outline-3 {
            left: 83.33%;
            top: 77.87%;
        }
        
        /* Decorative ellipses on left */
        .ellipse-left {
            position: absolute;
            width: 37.39%;
            height: 50.1%;
            left: -24.46%;
            stroke: #FCFCFC;
            fill: none;
        }
        
        .ellipse-left-1 {
            top: 74.21%;
        }
        
        .ellipse-left-2 {
            top: 60.67%;
        }
        
        /* Gradient ellipse */
        .gradient-ellipse {
            position: absolute;
            left: 18.27%;
            top: 30.53%;
            width: 23.33%;
            height: 30.73%;
        }
        
        /* Responsive font sizing for smaller screens */
        @media (max-width: 1400px) {
            .logo-text {
                font-size: 72px;
            }
            .welcome-text {
                font-size: 52px;
            }
            .form-label {
                font-size: 16px;
            }
            .form-input {
                font-size: 14px;
            }
            .signin-btn {
                font-size: 14px;
            }
            .remember-me label,
            .forgot-password {
                font-size: 12px;
            }
            .password-toggle {
                width: 24px;
                height: 24px;
            }
            .remember-me input[type="checkbox"] {
                width: 14px;
                height: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="desktop-container">
            <div class="desktop-inner">
                <!-- Background Video -->
                <div class="background-video-container">
                    <video autoplay loop muted playsinline>
                        <source src="https://videos.pexels.com/video-files/2499611/2499611-uhd_2560_1440_24fps.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                
                <!-- Gradient Overlay -->
                <div class="gradient-overlay"></div>
                
                <!-- Gradient Ellipse -->
                <svg class="gradient-ellipse" viewBox="0 0 332 311" fill="none" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="ellipseGradient" x1="166" y1="-116.493" x2="151.419" y2="483.441" gradientUnits="userSpaceOnUse">
                            <stop offset="0.316407" stop-color="#1A1C1E" />
                            <stop offset="0.536848" stop-color="#1A1C1E" stop-opacity="0" />
                        </linearGradient>
                    </defs>
                    <ellipse cx="166" cy="154.019" rx="166" ry="154.019" fill="url(#ellipseGradient)" />
                </svg>
                
                <!-- Logo Text -->
                <div class="logo-text">Attendx</div>
                
                <!-- Decorative Ellipses (Left Side) -->
                <svg class="ellipse-left ellipse-left-1" viewBox="0 0 532 507" fill="none" preserveAspectRatio="none">
                    <ellipse cx="266" cy="253.5" rx="265.5" ry="253" stroke="#FCFCFC" />
                </svg>
                
                <svg class="ellipse-left ellipse-left-2" viewBox="0 0 532 507" fill="none" preserveAspectRatio="none">
                    <ellipse cx="266" cy="253.5" rx="265.5" ry="253" stroke="#FCFCFC" />
                </svg>
                
                <!-- Welcome Back Text -->
                <div class="welcome-text">
                    Welcome<br>Back
                </div>
                
                <!-- Form -->
                <div class="form-container">
                    <!-- Student ID Field -->
                    <div class="form-field">
                        <div class="form-label">Student user id</div>
                        <input type="text" class="form-input" placeholder="Enter your stduent id">
                    </div>
                    
                    <!-- Password Field -->
                    <div class="password-field">
                        <div class="form-field">
                            <div class="form-label">Password</div>
                            <div class="password-input-wrapper">
                                <input type="password" class="form-input" id="passwordInput" placeholder="Enter your password">
                                <div class="password-toggle" onclick="togglePassword()">
                                    <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none">
                                        <path d="M13.9997 17.0479C14.6618 17.0479 15.2666 16.9736 15.8182 16.8453L14.5883 15.5782C14.3972 15.5934 14.2033 15.6056 13.9997 15.6056C10.254 15.6056 8.80297 12.8322 8.45158 12C8.71544 11.3934 9.0718 10.8342 9.50716 10.3436L8.52858 9.33543C7.452 10.5375 7.04391 11.7483 7.03621 11.7721C6.98793 11.9202 6.98793 12.0805 7.03621 12.2286C7.05091 12.2762 8.65668 17.0479 13.9997 17.0479ZM13.9997 6.9521C12.7138 6.9521 11.6575 7.23766 10.7769 7.65952L8.19469 5L7.20491 6.01968L19.8046 19L20.7944 17.9803L18.4711 15.5869C20.3009 14.18 20.954 12.2589 20.9638 12.2286C21.0121 12.0805 21.0121 11.9202 20.9638 11.7721C20.9484 11.7238 19.3426 6.9521 13.9997 6.9521ZM17.48 14.5658L15.884 12.9216C16.017 12.6404 16.0996 12.331 16.0996 12C16.0996 10.8166 15.1483 9.83661 13.9997 9.83661C13.6784 9.83661 13.3781 9.92171 13.1058 10.0594L11.8402 8.75564C12.5349 8.51003 13.2652 8.38786 13.9997 8.39435C17.7453 8.39435 19.1963 11.1678 19.5477 12C19.3363 12.499 18.7315 13.6889 17.48 14.5658Z" fill="#484A4B"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Form Options -->
                        <div class="form-options">
                            <div class="remember-me">
                                <input type="checkbox" id="remember">
                                <label for="remember">Remember me</label>
                            </div>
                            <a href="#" class="forgot-password">Forgot Password</a>
                        </div>
                    </div>
                </div>
                
                <!-- Sign In Button -->
                <div class="signin-container">
                    <button class="signin-btn">Login in</button>
                </div>
                
                <!-- Menu Icon -->
                <div class="menu-icon">
                    <div class="menu-line"></div>
                    <div class="menu-line"></div>
                    <div class="menu-line"></div>
                </div>
                
                <!-- Decorative Filled Circle (Bottom Right) -->
                <svg class="circle-filled" viewBox="0 0 386 386" fill="none" preserveAspectRatio="none">
                    <circle cx="193" cy="193" r="193" fill="#1A1C1E" />
                </svg>
                
                <!-- Circle Outlines (Bottom Right) -->
                <svg class="circle-outline circle-outline-1" viewBox="0 0 393 393" fill="none" preserveAspectRatio="none">
                    <circle cx="196.5" cy="196.5" r="195.5" stroke="black" stroke-width="2" fill="none" />
                </svg>
                
                <svg class="circle-outline circle-outline-2" viewBox="0 0 393 393" fill="none" preserveAspectRatio="none">
                    <circle cx="196.5" cy="196.5" r="195.75" stroke="black" stroke-width="1.5" fill="none" />
                </svg>
                
                <svg class="circle-outline circle-outline-3" viewBox="0 0 393 393" fill="none" preserveAspectRatio="none">
                    <circle cx="196.5" cy="196.5" r="196" stroke="black" stroke-width="1" fill="none" />
                </svg>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }
    </script>
</body>
</html>
